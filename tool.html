<!DOCTYPE html>
<html>
<head>
<title>Phishing Analyzer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main">

    <h1>🔍 Phishing Analyzer</h1>

    <div class="box">
        <input type="text" id="input" placeholder="Enter URL...">

        <button id="analyzeBtn">Analyze</button>
        <button id="historyBtn">Show History</button>
        <button id="deleteBtn">Clear History</button>
    </div>

    <div id="result" class="hidden"></div>

</div>

<div class="history-section">
    <h2>📊 History</h2>

    <select id="filter">
        <option value="all">All</option>
        <option value="Safe">Safe</option>
        <option value="Suspicious">Suspicious</option>
        <option value="Dangerous">Dangerous</option>
    </select>

    <div id="history"></div>
</div>

<!-- IMPORTANT: scripts at bottom -->
<script src="script.js"></script>

<script>
document.getElementById("analyzeBtn").addEventListener("click", analyze);
document.getElementById("historyBtn").addEventListener("click", () => loadHistory("all"));
document.getElementById("deleteBtn").addEventListener("click", clearHistory);

document.getElementById("filter").addEventListener("change", (e) => {
    loadHistory(e.target.value);
});
</script>

</body>
</html>
